name: acougue_validade_app
description: Controle local de validade de carnes com OCR e notificações.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  intl: ^0.20.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.32

flutter:
  uses-material-design: true